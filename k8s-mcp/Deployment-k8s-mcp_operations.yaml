apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp-operations
  namespace: imsilva
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp-operations
  template:
    metadata:
      labels:
        app: k8s-mcp-operations
    spec:
      serviceAccountName: k8s-mcp
      containers:
        - name: k8s-mcp-operations
          image: igormsilva/k8s-mcp-operations:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MCP_TRANSPORT
              value: "sse"
            - name: MCP_PORT
              value: "8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---

apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp-operations
  namespace: imsilva
spec:
  selector:
    app: k8s-mcp-operations
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8082 # Ensure this matches the MCP_PORT in k8s_operations_mcp.py