apiVersion: v1
kind: Secret
metadata:
  name: k8s-assistant-secret
  # namespace: your-namespace
type: Opaque
stringData:
  # LLM
  OLLAMA_BASE_URL: "http://ollama-service:11434/v1"
  OPENAI_BASE_URL: "http://ollama-service:11434/v1"
  OPENAI_API_KEY: "sk-placeholder"
  OLLAMA_API_KEY: "sk-placeholder"
  MODELO_OPEN_WEB_UI: "gpt-oss:20b"

  # MCP servers — update to match your in-cluster service names
  MCP_K8S_OPERATIONS_URL: "http://mcp-k8s-service/mcp"
  MCP_JAEGER_URL: "http://mcp-jaeger-service/mcp"
  MCP_K8S_LOGS_URL: "http://mcp-logs-service/mcp"
  MCP_PROMETHEUS_URL: "http://mcp-prometheus-service/sse"

  # Langfuse (optional — system works without it)
  LANGFUSE_SECRET_KEY: "sk-placeholder"
  LANGFUSE_PUBLIC_KEY: "pk-placeholder"
  LANGFUSE_BASE_URL: "http://langfuse-service:3000"
