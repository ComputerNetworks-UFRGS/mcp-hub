apiVersion: v1
kind: Service
metadata:
  name: k8s-assistant
  # namespace: your-namespace
spec:
  selector:
    app: k8s-assistant
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
  # Change to NodePort or LoadBalancer to expose outside the cluster.
  # Or add an Ingress pointing to this service.
