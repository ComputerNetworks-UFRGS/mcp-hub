apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-promql-mcp ## Ensure this matches the name in Service.yaml
  namespace: imsilva ## Ensure this matches the namespace in Service.yaml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-promql-mcp
  template:
    metadata:
      labels:
        app: prometheus-promql-mcp
    spec:
      serviceAccountName: k8s-mcp
      containers:
        - name: prometheus-promql-mcp
          image: igormsilva/prometheus-promql-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MCP-TRANSPORT
              value: "sse"
            - name: MCP-PORT
              value: "8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-promql-mcp
  namespace: imsilva
spec:
  selector:
    app: prometheus-promql-mcp
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8001 # Ensure this matches the MCP_PORT in prometheus-promql-mcp.py